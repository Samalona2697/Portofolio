<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lona Simanjuntak - Portfolio</title>
    <style>
        /* Reset CSS Sederhana untuk konsistensi */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f0f0f0; /* Latar belakang abu-abu terang */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* Font yang lebih bersih */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background-color: #ffffff; /* Kartu putih */
            border-radius: 20px; /* Sudut membulat */
            padding: 50px 40px; /* Padding yang lebih baik */
            width: 90%;
            max-width: 650px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); /* Bayangan yang lebih dalam */
            text-align: center; /* Pemusatan teks secara keseluruhan */
        }

        h1 {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 5px;
            color: #333;
        }

        .title {
            font-size: 1em;
            font-weight: normal;
            margin-bottom: 25px;
            color: #666;
        }

        h2 {
            font-size: 1.5em;
            margin-top: 35px;
            margin-bottom: 12px;
            color: #444;
        }

        p {
            color: #555;
            line-height: 1.6;
        }

        /* Perbaikan Daftar Proyek */
        .project-list {
            display: inline-block; /* Agar `text-align: center` pada induk berfungsi untuk memusatkan blok */
            text-align: left; /* Item di dalam blok didorong ke kiri */
            padding: 0;
            margin-top: 5px;
        }

        .project-list li {
            margin-bottom: 8px;
            list-style-type: disc; /* Poin */
            margin-left: 20px; /* Beri jarak dari tepi blok untuk poin */
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Lona Simanjuntak</h1>
        <p class="title">UI/UX Designer | Flutter Developer</p>
        
        <h2>Tentang Saya</h2>
        <p>Mahasiswa IT yang fokus pada pengembangan aplikasi mobile dan desain UI/UX.</p>
        
        <h2>Project</h2>
        <ul class="project-list">
            <li>MyHSK</li>
            <li>Flutter Hanzi Memory Game</li>
            <li>Career Preparation Platform</li>
        </ul>
        
        <h2>Kontak</h2>
        <p>Email: emailkamu@gmail.com</p>
    </div>
</body>
</html>
